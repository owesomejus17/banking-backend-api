# ===== DATA SOURCE =====
# Update username/password to match your local PostgreSQL credentials
spring.datasource.url=jdbc:postgresql://localhost:5432/securebankdb
spring.datasource.username=postgres
spring.datasource.password=12345678
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / HIBERNATE =====
# 'update' creates/alters tables automatically on startup — ideal for development.
# Change to 'validate' or 'none' before going to production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== SERVER =====
server.port=8080

# ===== JWT =====
# Secret must be at least 256 bits (32 chars) for HMAC-SHA256.
# In production, load this from an environment variable or secrets manager.
jwt.secret=SecureBankSuperSecretKey@12345678901234
jwt.expiration=86400000

# ===== SPRINGDOC / SWAGGER =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ===== LOGGING =====
logging.level.com.securebank=DEBUG
logging.level.org.springframework.security=INFO
